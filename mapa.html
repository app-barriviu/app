<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BV App - Mapa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="map-full-bg">
        <div class="map-overlay-red"></div>
    </div>

    <div class="bottom-sheet">
        <div class="drag-handle"></div>
        <div class="sheet-header">
            <h2>Esdeveniments a prop</h2>
            <i class="fas fa-chevron-down"></i>
        </div>

        <div class="event-list">
            <div class="event-item">
                <div class="mini-img-red"></div>
                <div class="details">
                    <h3>Concert: The Tyets</h3>
                    <p>22:00 · <i class="fas fa-map-marker-alt"></i> Sant Boi</p>
                    <span class="dist">1.2 km</span>
                </div>
            </div>
            <div class="event-item">
                <div class="mini-img-red"></div>
                <div class="details">
                    <h3>Nit de DJ's</h3>
                    <p>23:00 · <i class="fas fa-map-marker-alt"></i> Cornellà</p>
                    <span class="dist">2.5 km</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-map-marker-alt active-icon"></i>
        <div class="nav-plus"><i class="fas fa-plus"></i></div>
        <i class="fas fa-heart"></i>
        <i class="fas fa-user"></i>
    </nav>
</div>

</body>
</html>
