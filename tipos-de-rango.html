<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BV App - Rangs de Punts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="scrollable-content">
        <header class="header-ranking">
            <div class="btn-back-blue" onclick="window.history.back()">
                <i class="fas fa-arrow-left"></i>
            </div>
            <h2>Rangs de punts</h2>
        </header>

        <div class="ranges-grid">
            
            <div class="range-item">
                <div class="placeholder-img-red"></div>
                <span class="range-name">Curiós</span>
                <span class="range-desc">0-199 pts</span>
            </div>

            <div class="range-item">
                <div class="placeholder-img-red"></div>
                <span class="range-name">Asistent</span>
                <span class="range-desc">200-599 pts</span>
            </div>

            <div class="range-item">
                <div class="placeholder-img-red"></div>
                <span class="range-name">Conector</span>
                <span class="range-desc">600-1499 pts</span>
            </div>

            <div class="range-item">
                <div class="placeholder-img-red"></div>
                <span class="range-name">Ambaixador</span>
                <span class="range-desc">1500-2999 pts</span>
            </div>

            <div class="range-item full-width">
                <div class="placeholder-img-red large"></div>
                <span class="range-name">Llegenda del Baix</span>
                <span class="range-desc">3000+ pts</span>
            </div>

        </div>
    </div>

    <nav class="bottom-nav">
        <i class="fas fa-home" onclick="location.href='index.html'"></i>
        <i class="fas fa-map-marker-alt" onclick="location.href='mapa.html'"></i>
        <div class="nav-plus" onclick="location.href='crear.html'"><i class="fas fa-plus"></i></div>
        <i class="fas fa-heart" onclick="location.href='favorits.html'"></i>
        <i class="fas fa-user active-icon" onclick="location.href='perfil.html'"></i>
    </nav>
</div>

</body>
</html>
